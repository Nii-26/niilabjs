<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hello, world!</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>
  
  <style>
  html, 
  body, 
  #viewDiv {
    padding: 0;
    margin: 0;
    height: 100%;
    width: 100%;
  }
</style>

</head>
<body>
<div id="viewDiv"></div>

<script> 
require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Expand",
    "esri/widgets/Search",
    "esri/layers/GraphicsLayer",
    "esri/Graphic"
  ], function(esriConfig, Map, MapView, BasemapGallery, Expand, Search, GraphicsLayer, Graphic) {
    esriConfig.apiKey = "AAPTaBYUCP8VdASkl0zXCT2yICA..EozE9ZaXvCAWsuXL9S1fzUeGS71LyuSq8ryoWDz6rzg7qjp5gbew28Eaqy7vLDeSqRRKNs9qeNyRH68YU2J9yc7jzrnzdhEW2C0fLBDrJhMUKq32AWscY4dw_JwOXhsP3-JIiTsMcuVcWJC9sf5g_azyUZQv8AHHKWxHNAlb647MRhFO6pOuy9V74sSBiEbzDv0-1OaaVAWhiyh1grKGRNfGV29wnxkDI5kREVm8T1Cf4TJdl2UZOihpcULBR-CiL8pHUgggVmF7b8TllAMl8Q..AT1_bryZT1WS"; // Replace with your ArcGIS API key

    const map = new Map({
      basemap: "streets-vector" // Basemap layer
    });

    // Graphics layer to show user's location and accuracy
    const graphicsLayer = new GraphicsLayer();
    map.add(graphicsLayer);

    const view = new MapView({
      map: map,
      center: [-0.1870, 5.6037], //longitude, latitude
      zoom: 11, // Zoom level 
      container: "viewDiv" // Div element
    });

    // Create BasemapGallery widget
    const basemapGallery = new BasemapGallery({
      view: view
    });

    // Create Expand widget to collapse/expand the BasemapGallery
    const bgExpand = new Expand({
      view: view,
      content: basemapGallery,
      expandIconClass: "esri-icon-basemap",
      expanded: false
    });

    // Add the expanded basemap gallery to the view UI
    view.ui.add(bgExpand, "top-right");

    // Create Search widget
    const searchWidget = new Search({
      view: view,
      allPlaceholder: "Search for addresses, landmarks, or coordinates"
    });

    // Add the Search widget to the top-left of the view UI
    view.ui.add(searchWidget, "top-left");

    // Legacy ArcGIS Locate widget removed; using manual geolocation button below

    // Add a manual Locate button that uses HTML5 geolocation (reliable centering)
    const locateBtn = document.createElement("div");
    locateBtn.className = "esri-widget esri-widget--button esri-interactive";
    locateBtn.title = "Find my current location";
    locateBtn.innerHTML = '<span class="esri-icon-locate" aria-hidden="true"></span>';
    locateBtn.addEventListener("click", function() {
      if (!navigator.geolocation) {
        console.warn("Geolocation not supported by browser");
        return;
      }
        navigator.geolocation.getCurrentPosition(function(position) {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;
          const accuracy = position.coords.accuracy || 0;

          // center the view
          view.goTo({ center: [longitude, latitude], zoom: 19 });

          // clear previous graphics
          graphicsLayer.removeAll();

          // (accuracy circle removed)

          // add a marker for the precise location
          const pointGraphic = new Graphic({
            geometry: { type: "point", longitude: longitude, latitude: latitude },
            symbol: {
              type: "simple-marker",
              style: "circle",
              color: [0, 162, 255, 1],
              size: "12px",
              outline: { color: [255, 255, 255, 0.9], width: 2 }
            }
          });
          graphicsLayer.add(pointGraphic);
      }, function(error) {
        console.warn("Geolocation error:", error.message);
      }, {
        enableHighAccuracy: true,
        timeout: 10000
      });
    });

    view.ui.add(locateBtn, "top-left");

    // Automatic geolocation is disabled. Use the Locate widget to center the map on the user's location.
    // To re-enable automatic geolocation on load, uncomment the block below.
    /*
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(position) {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        view.center = [longitude, latitude];
        view.zoom = 14;
        console.log("Map centered on user location: ", latitude, longitude);
      }, function(error) {
        console.warn("Geolocation error:", error.message);
      });
    } else {
      console.log("Geolocation not supported by browser");
    }
    */
});
</script>
</body>
</html>
